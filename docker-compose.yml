services:
  eufy-ws:
    build: ./eufy-ws
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "5"
    # No ports — only reachable by other containers on the bridge network
    volumes:
      - eufy_ws_data:/data
    environment:
      - USERNAME=${EUFY_USERNAME}
      - PASSWORD=${EUFY_PASSWORD}
      - COUNTRY=${EUFY_COUNTRY}
    healthcheck:
      test: ["CMD", "node", "-e", "const s=require('net').createConnection(3000,'localhost');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  eufy-bridge:
    build: ./bridge
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      eufy-ws:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"   # captcha endpoint — localhost only
    volumes:
      - ./local_files:/app/local_files
    environment:
      - EUFY_WS_URL=ws://eufy-ws:3000
      - DOORBELL_SN=${DOORBELL_SN}
      - HOMEBASE_SN=${HOMEBASE_SN}
      - VID_ANALYSER_API_URL=${VID_ANALYSER_API_URL}
      - VID_ANALYSER_API_KEY=${VID_ANALYSER_API_KEY}
      - CAPTCHA_PORT=8080

  vid-analyser-api:
    build:
      context: ./vid-analyser
      dockerfile: Dockerfile.api
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VID_ANALYSER_STORAGE_PROVIDER=${VID_ANALYSER_STORAGE_PROVIDER}
      - VID_ANALYSER_STORAGE_ROOT=${VID_ANALYSER_STORAGE_ROOT}
      - VID_ANALYSER_SQLITE_PATH=${VID_ANALYSER_SQLITE_PATH}
      - ENABLE_API_DOCS=${ENABLE_API_DOCS}
      - VID_ANALYSER_API_KEY=${VID_ANALYSER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - UI_BASIC_AUTH_USER=${UI_BASIC_AUTH_USER}
      - UI_BASIC_AUTH_PASSWORD=${UI_BASIC_AUTH_PASSWORD}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
    ports:
      - "8000:8000"
    volumes:
      - ./local_files/vid-analyser:/app/data


volumes:
  eufy_ws_data:
